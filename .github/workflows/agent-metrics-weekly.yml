name: Agent Metrics Weekly

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    name: Generate Agent Scorecard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate scorecard template
        run: npm run agents:metrics

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-scorecard
          path: reports/agent-scorecard.json
